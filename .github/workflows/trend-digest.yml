name: Generate Trend Digests

on:
  schedule:
    # Runs at 9am UTC every Monday and Thursday (twice weekly)
    - cron: '0 9 * * 1,4'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-digests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trend pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python run_pipeline.py

      - name: Commit and push digests
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add digests/
          git add data/trends.db
          git diff --staged --quiet || git commit -m "Add trend digests for $(date +'%Y-%m-%d')"
          git push
